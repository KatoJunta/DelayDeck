name: Build Windows ZIP

on:
  workflow_dispatch:
    inputs:
      obs_ref:
        description: "OBS Studio release tag to build against"
        required: true
        type: choice
        default: "all"
        options:
          - "all"
          - "32.1.2"
          - "31.1.2"
          - "30.2.3"
      version:
        description: "Release tag (example: v0.1.0). Empty uses VERSION file."
        required: false
        default: ""
      publish_release:
        description: "Publish to GitHub Release after a successful build"
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-zip:
    name: Build Windows x64 package
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        obs_ref: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.obs_ref != 'all' && format('["{0}"]', inputs.obs_ref) || '["32.1.2","31.1.2","30.2.3"]') }}

    defaults:
      run:
        shell: pwsh

    env:
      BUILD_TYPE: RelWithDebInfo
      OBS_REF: ${{ matrix.obs_ref }}
      INPUT_VERSION: ${{ github.event.inputs.version || '' }}
      INPUT_PUBLISH_RELEASE: ${{ github.event.inputs.publish_release || 'false' }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout DelayDeck
        uses: actions/checkout@v4

      - name: Sync version metadata
        run: .\scripts\dev\sync-version.ps1

      - name: Validate release inputs
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
        run: |
          $inputVersion = $env:INPUT_VERSION.Trim()
          if ($inputVersion) {
            exit 0
          }

          $version = (Get-Content VERSION -Raw).Trim()
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            Write-Error "Set version input or fix VERSION file (major.minor.patch)"
            exit 1
          }

      - name: Checkout OBS Studio
        uses: actions/checkout@v4
        with:
          repository: obsproject/obs-studio
          ref: ${{ env.OBS_REF }}
          path: external/obs-studio
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/relay-engine/go.mod
          cache-dependency-path: apps/relay-engine/go.sum

      - name: Cache OBS dependencies
        uses: actions/cache@v4
        with:
          path: external/obs-studio/.deps
          key: obs-deps-windows-x64-${{ env.OBS_REF }}-${{ hashFiles('external/obs-studio/cmake/windows/buildspec.cmake') }}
          restore-keys: |
            obs-deps-windows-x64-${{ env.OBS_REF }}-
            obs-deps-windows-x64-

      - name: Configure OBS Studio
        working-directory: external/obs-studio
        run: >
          cmake --preset windows-x64
          -DENABLE_BROWSER=OFF
          -DENABLE_WEBRTC=OFF
          -DENABLE_VLC=OFF
          -DENABLE_AJA=OFF
          -DENABLE_DECKLINK=OFF

      - name: Build OBS libraries needed by the plugin
        working-directory: external/obs-studio
        run: cmake --build --preset windows-x64 --config $env:BUILD_TYPE --target libobs obs-frontend-api

      - name: Build DelayDeck Relay
        working-directory: apps/relay-engine
        run: |
          $relayOutDir = Join-Path $env:GITHUB_WORKSPACE "build\relay"
          New-Item -ItemType Directory -Force -Path $relayOutDir | Out-Null
          go build -trimpath -ldflags="-s -w" -o (Join-Path $relayOutDir "delaydeck-relay.exe") ./cmd/delaydeck-relay

      - name: Build DelayDeck OBS plugin
        run: >
          .\scripts\dev\build-obs-plugin.ps1
          -ObsStudioDir "$env:GITHUB_WORKSPACE\external\obs-studio"
          -BuildDir "$env:GITHUB_WORKSPACE\build\obs-plugin"

      - name: Stage OBS drag-and-drop package
        id: package
        run: |
          function Normalize-VersionTag([string]$raw) {
            $trimmed = $raw.Trim()
            if ($trimmed -eq "") {
              return ""
            }
            if ($trimmed.StartsWith("v")) {
              return $trimmed
            }
            return "v$trimmed"
          }

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
            $releaseTag = $version
          } elseif ($env:GITHUB_EVENT_NAME -eq "workflow_dispatch" -and $env:INPUT_PUBLISH_RELEASE -eq "true") {
            $rawVersion = $env:INPUT_VERSION.Trim()
            if (-not $rawVersion) {
              $rawVersion = (Get-Content (Join-Path $env:GITHUB_WORKSPACE "VERSION") -Raw).Trim()
            }
            $version = Normalize-VersionTag $rawVersion
            $releaseTag = $version
          } else {
            $shortSha = $env:GITHUB_SHA.Substring(0, 7)
            $version = "dev-$shortSha"
            $releaseTag = ""
          }

          $packageRoot = Join-Path $env:GITHUB_WORKSPACE "build\package"
          $pluginDest = Join-Path $packageRoot "obs-plugins\64bit"
          $localeDest = Join-Path $packageRoot "data\obs-plugins\delaydeck\locale"
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "build\artifacts"

          New-Item -ItemType Directory -Force -Path $pluginDest, $localeDest, $artifactDir | Out-Null

          Copy-Item "$env:GITHUB_WORKSPACE\build\obs-plugin\$env:BUILD_TYPE\delaydeck.dll" (Join-Path $pluginDest "delaydeck.dll") -Force
          Copy-Item "$env:GITHUB_WORKSPACE\build\relay\delaydeck-relay.exe" (Join-Path $pluginDest "delaydeck-relay.exe") -Force
          Copy-Item "$env:GITHUB_WORKSPACE\apps\obs-plugin\data\locale\*.ini" $localeDest -Force

          $zipName = "delaydeck-$version-obs-$env:OBS_REF-windows-x64.zip"
          $zipPath = Join-Path $artifactDir $zipName
          Compress-Archive -Path "$packageRoot\*" -DestinationPath $zipPath -Force

          $artifactName = "delaydeck-$version-obs-$env:OBS_REF-windows-x64"
          "zip_name=$zipName" >> $env:GITHUB_OUTPUT
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT
          "artifact_name=$artifactName" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

          Get-ChildItem $packageRoot -Recurse | Select-Object FullName, Length

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: build/package/**
          if-no-files-found: error

      - name: Upload package to GitHub Release
        if: >-
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.release_tag }}
          name: DelayDeck ${{ steps.package.outputs.release_tag }}
          files: ${{ steps.package.outputs.zip_path }}
          draft: false
          prerelease: false
          generate_release_notes: true
